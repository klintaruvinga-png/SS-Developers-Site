<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" class="hand-drawn-diagram">
  <defs>
    <style>
      .hand-drawn-diagram {
        background: #e5e7eb;
        border: 1px solid #111;
        border-radius: 4px;
        box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
      }
      .flow-node:hover {
        fill-opacity: 0.8;
      }
      .flow-arrow {
        marker-end: url(#arrowhead);
        stroke-linecap: round;
        stroke-dasharray: 4,2;
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#e5e7eb" />

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#111">
    Stokvel Society Contribution Flow
  </text>

  <!-- Nodes -->
  <g id="node-member" class="flow-node">
    <rect x="100" y="120" width="120" height="40" rx="2" ry="2" stroke="#f90" stroke-width="1.5" fill="#fff8e0" />
    <text x="160" y="145" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a1a1a">Member Contribution</text>
  </g>
  <g id="node-ledger" class="flow-node">
    <rect x="300" y="120" width="120" height="40" rx="2" ry="2" stroke="#90f" stroke-width="1.5" fill="#f0f0ff" />
    <text x="360" y="145" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a1a1a">Ledger / Trust Layer</text>
  </g>
  <g id="node-payout" class="flow-node">
    <rect x="500" y="120" width="120" height="40" rx="2" ry="2" stroke="#f66" stroke-width="1.5" fill="#ffe0e0" />
    <text x="560" y="145" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a1a1a">Payout / Distribution</text>
  </g>

  <!-- Arrows -->
  <g class="flow-arrow">
    <path d="M 220 140 L 300 140" stroke="#e5e7eb" stroke-width="1" fill="none" />
    <polygon points="0,0 8,4 0,8" transform="translate(300, 140) rotate(0)" stroke="#e5e7eb" fill="#111" />
  </g>
  <g class="flow-arrow">
    <path d="M 420 140 L 500 140" stroke="#e5e7eb" stroke-width="1" fill="none" />
    <polygon points="0,0 8,4 0,8" transform="translate(500, 140) rotate(0)" stroke="#e5e7eb" fill="#111" />
  </g>
</svg>