name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c7467e0571747f8ec63a6c9dcd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178fba8601090cea46a7b50cc
        with:
          node-version: '20'
          cache: 'npm'
        env:
          ACTIONS_CACHE_KEY_STRICT: true
        # Note: actions/setup-node does not have persist-credentials option.
        # Use checkout with persist-credentials: false instead.

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        uses: cloudflare/wrangler-action@bbf08b118d0e2ee8b0d1a69a6a1b0e18ee59b2da
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
